model_list:
  - model_name: cc-opus
    litellm_params:
      model: openai/gpt-5.4
      api_base: os.environ/LITELLM_UPSTREAM_BASE_URL
      api_key: os.environ/LITELLM_UPSTREAM_API_KEY
      reasoning_effort: xhigh
    model_info:
      mode: chat

  - model_name: cc-sonnet
    litellm_params:
      model: openai/gpt-5.4
      api_base: os.environ/LITELLM_UPSTREAM_BASE_URL
      api_key: os.environ/LITELLM_UPSTREAM_API_KEY
      reasoning_effort: high
    model_info:
      mode: chat

  - model_name: cc-haiku
    litellm_params:
      model: openai/gpt-5.4-mini
      api_base: os.environ/LITELLM_UPSTREAM_BASE_URL
      api_key: os.environ/LITELLM_UPSTREAM_API_KEY
      reasoning_effort: medium
    model_info:
      mode: chat

litellm_settings:
  drop_params: true
  num_retries: 2
  request_timeout: 90

general_settings:
  master_key: sk-litellm-claude-codex-local
